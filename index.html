<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" , content="width=device-width, initial-scale=1.0">
    <title>CALENDARIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!--<link rel="icon" href="assets/img/E"-->
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
</head>


<body>
    <div class="container">
        <main>
            <!-- nome del mese-->
            <h1></h1>
            <!--Griglia del calendario-->
            <div id="calendar"></div>
            <!--Impegni giornalieri-->
            <h2>Add Meeting</h2>
            <div id="addMeeting">
                <div>
                    <h4>Meeting day</h4>
                    <span id="newMeetingDay">scegli il giorno</span>
                </div>
                <form>
                    <div>
                        <h4>Meeting Time</h4>
                        <input type="time" id="newMeetingTime" />
                    </div>
                    <div>
                        <h4>Meeting Name</h4>
                        <input type="text" id="newMeetingName" placeholder="Inserisci l'impegno">
                    </div>
                    <div>
                        <h4>Add</h4>
                        <button type="submit">Save Meeting</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!--Impegni inseriti-->
    <article>
        <div id="appointments">
            <h2>Impegni del giorno : </h2>
            <ul></ul>
        </div>

    </article>
    <script src="assets/js/script.js"></script>
</body>

</html>
